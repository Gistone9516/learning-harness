<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학습 프레임워크 · 과목 선택</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f1ea; --card:#fcfaf5; --ink:#3a3631; --muted:#8c857a;
      --line:#e7e1d6; --accent:#7c8a72; --accent-soft:#e9ede3; --shadow:rgba(80,72,60,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      background:var(--bg); color:var(--ink);
      font-family:'IBM Plex Sans KR',sans-serif;
      display:flex; flex-direction:column; align-items:center;
      padding:64px 24px 48px; min-height:100%;
    }
    .head{text-align:center; max-width:640px; margin-bottom:44px}
    .head h1{
      font-family:'Gowun Batang',serif; font-weight:700;
      font-size:32px; margin:0 0 10px; letter-spacing:-.5px;
    }
    .head p{margin:0; color:var(--muted); font-size:15px; line-height:1.6}
    .grid{
      display:grid; gap:20px; width:100%; max-width:760px;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    }
    .card{
      display:flex; flex-direction:column; gap:14px;
      background:var(--card); border:1px solid var(--line); border-radius:18px;
      padding:26px 24px; text-decoration:none; color:inherit;
      box-shadow:0 2px 10px var(--shadow);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .card:hover{transform:translateY(-3px); box-shadow:0 8px 22px var(--shadow); border-color:var(--accent)}
    .glyph{
      width:52px; height:52px; border-radius:14px;
      background:var(--accent-soft); color:var(--accent);
      display:flex; align-items:center; justify-content:center;
      font-family:'Gowun Batang',serif; font-size:26px; font-weight:700;
    }
    .card h2{margin:0; font-size:19px; font-weight:600}
    .card p{margin:0; color:var(--muted); font-size:13.5px; line-height:1.55}
    .go{margin-top:auto; color:var(--accent); font-size:13px; font-weight:600}
    .foot{margin-top:40px; color:var(--muted); font-size:12px}
    #empty{color:var(--muted); font-size:14px}
  </style>
</head>
<body>
  <div class="head">
    <h1>학습 프레임워크</h1>
    <p>공부할 과목을 선택하세요. 카드 퀴즈로 개념 → 명령어 → 실전 순서로 인출 연습합니다.</p>
  </div>

  <div class="grid" id="subject-grid"><p id="empty">과목을 불러오는 중…</p></div>

  <div class="foot">로컬 개인 학습용 · 진도는 이 브라우저에 저장됩니다</div>

  <script src="subjects.js"></script>
  <script>
    (function () {
      var grid = document.getElementById('subject-grid');
      var order = window.SUBJECTS_ORDER || Object.keys(window.SUBJECTS || {});
      if (!order.length) { grid.innerHTML = '<p id="empty">등록된 과목이 없습니다.</p>'; return; }
      grid.innerHTML = '';
      order.forEach(function (id) {
        var s = window.SUBJECTS[id];
        if (!s) return;
        var a = document.createElement('a');
        a.className = 'card';
        a.href = 'study.html?subject=' + encodeURIComponent(id);
        a.innerHTML =
          '<div class="glyph">' + (s.glyph || s.label.charAt(0)) + '</div>' +
          '<h2>' + s.label + '</h2>' +
          '<p>' + (s.desc || '') + '</p>' +
          '<span class="go">학습 시작 →</span>';
        grid.appendChild(a);
      });
    })();
  </script>
</body>
</html>
